<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0f1419" />
    <title>Tour — Ghar 360</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;600&family=Noto+Sans+Devanagari:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        font-family: 'Noto Sans', 'Noto Sans Devanagari', system-ui, sans-serif;
        background: #0f1419;
        color: #e8eef7;
      }
      #app-canvas {
        display: block;
        width: 100%;
        height: 100%;
        touch-action: none;
      }
      #hud {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 0.65rem 0.75rem calc(0.65rem + env(safe-area-inset-bottom));
        pointer-events: none;
        font-size: 0.82rem;
        line-height: 1.35;
        background: linear-gradient(transparent, rgba(15, 20, 25, 0.85));
        z-index: 2;
      }
      #hud a {
        pointer-events: auto;
        color: #9ef0c0;
      }
      #loading {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f1419;
        z-index: 5;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div id="loading" data-i18n="tourLoad">Loading…</div>
    <canvas id="app-canvas"></canvas>
    <div id="hud">
      <span data-i18n="tourTap"></span>
      &nbsp;·&nbsp;
      <a href="./index.html" data-i18n="tourBack">Home</a>
    </div>
    <script type="module" src="/src/tour.ts"></script>
  </body>
</html>
